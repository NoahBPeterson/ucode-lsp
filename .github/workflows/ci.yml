name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'syntaxes/**'
      - 'tests/**'
      - 'package.json'
      - 'webpack.config.js'
      - 'scripts/**'
      - '.github/**'
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Build packages
        run: ./scripts/build-packages.sh

      - name: Run tests
        run: bun test

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX
        uses: actions/upload-artifact@v5
        with:
          name: ucode-lsp-${{ steps.version.outputs.version }}.vsix
          path: ucode-lsp-${{ steps.version.outputs.version }}.vsix

      - name: Upload LSP server bundle
        uses: actions/upload-artifact@v5
        with:
          name: ucode-lsp-server-${{ steps.version.outputs.version }}
          path: dist/server.js
